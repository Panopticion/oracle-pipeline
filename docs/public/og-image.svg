<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle glow behind eye -->
  <circle cx="600" cy="240" r="300" fill="url(#glow)"/>

  <!-- Eye icon (scaled from eye-icon.svg) -->
  <g transform="translate(540, 100) scale(1.875)">
    <path d="M4 32C4 32 16 12 32 12C48 12 60 32 60 32C60 32 48 52 32 52C16 52 4 32 4 32Z"
          stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="32" r="10" stroke="#22d3ee" stroke-width="2.5" fill="none"/>
    <circle cx="32" cy="32" r="4" fill="#22d3ee"/>
    <path d="M14 32H22" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M42 32H50" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M32 20V24" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M32 40V44" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="56" fill="url(#brand)">Panopticon AI</text>

  <!-- Tagline -->
  <text x="600" y="395" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">Know Where Every Vector Came From</text>

  <!-- Description line 1 -->
  <text x="600" y="450" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="18" fill="#64748b">Compliance-grade corpus ingestion for Postgres + pgvector</text>

  <!-- Pipeline flow -->
  <g font-family="Fira Code, SF Mono, monospace" font-size="14" fill="#64748b">
    <rect x="180" y="500" width="120" height="36" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
    <text x="240" y="523" text-anchor="middle" fill="#94a3b8">Validate</text>
    <text x="320" y="523" text-anchor="middle" fill="#334155">→</text>
    <rect x="340" y="500" width="120" height="36" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
    <text x="400" y="523" text-anchor="middle" fill="#94a3b8">Chunk</text>
    <text x="480" y="523" text-anchor="middle" fill="#334155">→</text>
    <rect x="500" y="500" width="120" height="36" rx="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <text x="560" y="523" text-anchor="middle" fill="#22d3ee">Watermark</text>
    <text x="640" y="523" text-anchor="middle" fill="#334155">→</text>
    <rect x="660" y="500" width="120" height="36" rx="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <text x="720" y="523" text-anchor="middle" fill="#22d3ee">Embed</text>
    <text x="800" y="523" text-anchor="middle" fill="#334155">→</text>
    <rect x="820" y="500" width="200" height="36" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
    <text x="920" y="523" text-anchor="middle" fill="#94a3b8">Postgres + pgvector</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#brand)" opacity="0.6"/>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Fira Code, SF Mono, monospace" font-size="14" fill="#64748b">panopticonlabs.ai</text>
</svg>
